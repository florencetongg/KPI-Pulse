<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Performance | KPI Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>

<div id="wrapper">
  <div class="row g-0">
  <nav class="col-md-2 d-none d-md-block sidebar shadow-sm">
    <div id="sidebar-container"></div>
    <div id="navbar-container"></div>
    </nav>

  <main class="col-md-10 px-4 bg-light min-vh-100">
    <div class="container-fluid p-4">
      <div class="d-flex justify-content-between align-items-center pt-2 pb-4 mb-4 border-bottom">
        <div>
          <h1 class="h3 fw-bold mb-1">Performance Management</h1>
          <p class="text-muted small mb-0">Manage and track your team's key results</p>
        </div>
        <button class="btn-primary-custom">+ New KPI</button>
      </div>

      <div class="card kpi-card shadow-sm">
        <div class="table-responsive">
          <table class="table align-middle mb-0">
            <thead>
              <tr>
                <th class="ps-4">Metric</th>
                <th>Progress</th>
                <th>Status</th>
                <th class="text-end pe-4">Action</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td class="ps-4 fw-semibold">Quarterly Revenue</td>
                <td>
                  <div class="d-flex align-items-center" style="min-width: 200px;">
                    <div class="progress w-100 me-2">
                      <div class="progress-bar" style="width: 75%;"></div>
                    </div>
                    <span class="small fw-bold">75%</span>
                  </div>
                </td>
                <td><span class="badge badge-active">In Progress</span></td>
                <td class="text-end pe-4">
                  <button class="btn btn-sm btn-light border">Edit</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/load-components.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
