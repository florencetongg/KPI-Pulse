<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | KPI System</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gradient-primary">

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card login-card border-0 shadow-lg p-4">
    <div class="text-center mb-4">
      <div class="brand-logo mb-2 mx-auto">K</div>
      <h3 class="fw-bold text-dark">Welcome Back</h3>
      <p class="text-muted small">Please enter your details to sign in</p>
    </div>

    <form>
      <div class="mb-3">
        <label class="form-label small fw-semibold text-secondary">Email Address</label>
        <input type="email" class="form-control custom-input" placeholder="name@company.com" required>
      </div>
      
      <div class="mb-3">
        <div class="d-flex justify-content-between">
          <label class="form-label small fw-semibold text-secondary">Password</label>
          <a href="reset-password.html" class="small text-decoration-none">Forgot?</a>
        </div>
        
        <div class="input-group">
          <input type="password" class="form-control custom-input" id="loginPassword" placeholder="••••••••" required>
          <span class="input-group-text bg-white border-start-0" id="togglePassword" style="cursor:pointer;">
            <i class="bi bi-eye-slash-fill text-muted"></i>
          </span>
        </div>
      </div>

      <div class="mb-4 form-check">
        <input type="checkbox" class="form-check-input" id="rememberMe">
        <label class="form-check-label small text-muted" for="rememberMe">Keep me logged in</label>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">Sign In</button>
    </form>

    <div class="text-center mt-4">
      <p class="small text-muted">Don't have an account? <a href="register.html" class="text-decoration-none">Sign Up</a></p>
    </div>
  </div>
</div>

<script>
  // Toggle Password Visibility Logic (Your original function)
  const togglePassword = document.querySelector('#togglePassword');
  const passwordInput = document.querySelector('#loginPassword');

  togglePassword.addEventListener('click', function () {
    // Toggle the type attribute
    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordInput.setAttribute('type', type);
    
    // Toggle the icon
    const icon = this.querySelector('i');
    icon.classList.toggle('bi-eye-fill');
    icon.classList.toggle('bi-eye-slash-fill');
  });
</script>

</body>
</html>
