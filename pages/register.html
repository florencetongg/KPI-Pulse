<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | KPI System</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../css/style.css">
</head>

<body class="bg-gradient-primary"> <div class="container d-flex justify-content-center align-items-center min-vh-100 py-5">
  <div class="card login-card border-0 shadow-lg p-4"> <div class="text-center mb-4">
      <div class="brand-logo mb-2 mx-auto">K</div>
      <h3 class="fw-bold text-dark">Create Account</h3>
      <p class="text-muted small">Please fill in your details to register</p>
    </div>

    <div id="errorAlert" class="alert alert-danger py-2 small d-none" role="alert">
      Please fix the errors below.
    </div>

    <form id="registerForm" novalidate>

      <div class="mb-3">
        <label for="fullName" class="form-label small fw-semibold text-secondary">Full Name</label>
        <input type="text" class="form-control custom-input" id="fullName" placeholder="John Doe" required>
        <div class="invalid-feedback">Full name is required.</div>
      </div>

      <div class="mb-3">
        <label for="department" class="form-label small fw-semibold text-secondary">Department</label>
        <select class="form-select custom-input" id="department" required>
          <option value="" selected disabled>Select Department</option>
          <option value="Executive">Executive</option>
          <option value="Sales">Sales</option>
          <option value="Marketing">Marketing</option>
          <option value="IT">IT</option>
          <option value="Finance">Finance</option>
          <option value="HR">HR</option>
          <option value="Operations">Operations</option>
        </select>
        <div class="invalid-feedback">Please select a department.</div>
      </div>

      <div class="mb-3">
        <label for="role" class="form-label small fw-semibold text-secondary">Account Role</label>
        <select class="form-select custom-input" id="role" required>
          <option value="" selected disabled>Select Role</option>
          <option value="manager">Manager (Admin Access)</option>
          <option value="staff">Staff (Personal Access)</option>
        </select>
        <div class="invalid-feedback">Please select a role.</div>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label small fw-semibold text-secondary">Email Address</label>
        <input type="email" class="form-control custom-input" id="email" placeholder="name@company.com" required>
        <div class="invalid-feedback">Please enter a valid email.</div>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label small fw-semibold text-secondary">Password</label>
        <div class="input-group">
          <input type="password" class="form-control custom-input border-end-0" id="password" placeholder="••••••••" required>
          <span class="input-group-text bg-white border-start-0 toggle-password" data-target="password" style="cursor:pointer;">
            <i class="bi bi-eye-slash-fill text-muted"></i>
          </span>
        </div>
        <div class="form-text small" style="font-size: 0.7rem;">Min 8 characters required.</div>
        <div class="invalid-feedback">Requirements not met.</div>
      </div>

      <div class="mb-4">
        <label for="confirmPassword" class="form-label small fw-semibold text-secondary">Confirm Password</label>
        <div class="input-group">
          <input type="password" class="form-control custom-input border-end-0" id="confirmPassword" placeholder="••••••••" required>
          <span class="input-group-text bg-white border-start-0 toggle-password" data-target="confirmPassword" style="cursor:pointer;">
            <i class="bi bi-eye-slash-fill text-muted"></i>
          </span>
        </div>
        <div class="invalid-feedback">Passwords must match.</div>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">
        Create Account
      </button>

    </form>

    <div class="text-center mt-4">
      <p class="small text-muted">
        Already have an account? 
        <a href="login.html" class="text-decoration-none">Login here</a>
      </p>
    </div>

  </div>
</div>

<script src="../js/auth.js"></script>
<script>
  const form = document.getElementById('registerForm');
  const errorAlert = document.getElementById('errorAlert');
  const passwordInput = document.getElementById('password');
  const confirmPassword = document.getElementById('confirmPassword');

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    let valid = true;
    errorAlert.classList.add('d-none');
    errorAlert.textContent = 'Please fix the errors below.';

    // Extract values
    const fullName = document.getElementById('fullName').value.trim();
    const department = document.getElementById('department').value;
    const role = document.getElementById('role').value;
    const email = document.getElementById('email').value.trim();
    const password = passwordInput.value;
    const confirm = confirmPassword.value;

    // Basic validation display
    form.querySelectorAll('input, select').forEach(el => {
      if (el.required && !el.value) {
        el.classList.add('is-invalid');
        valid = false;
      } else {
        el.classList.remove('is-invalid');
      }
    });

    if (password.length < 8) {
      passwordInput.classList.add('is-invalid');
      valid = false;
    }

    if (password !== confirm) {
      confirmPassword.classList.add('is-invalid');
      valid = false;
    }

    if (!valid) {
      errorAlert.classList.remove('d-none');
      return;
    }

    // Register via AuthManager
    const result = AuthManager.register({
      name: fullName,
      department: department,
      role: role,
      email: email,
      password: password
    });

    if (result.success) {
      alert('Registration successful! Redirecting to login...');
      window.location.href = 'login.html';
    } else {
      errorAlert.textContent = result.message;
      errorAlert.classList.remove('d-none');
    }
  });

  // Toggle Password Logic
  document.querySelectorAll('.toggle-password').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = document.getElementById(btn.getAttribute('data-target'));
      const icon = btn.querySelector('i');
      const isPassword = target.type === 'password';
      target.type = isPassword ? 'text' : 'password';
      
      icon.classList.toggle('bi-eye-fill', isPassword);
      icon.classList.toggle('bi-eye-slash-fill', !isPassword);
    });
  });
</script>

</body>
</html>
