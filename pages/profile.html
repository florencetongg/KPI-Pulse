<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | KPI Pulse</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/css/style.css">
</head>

<body class="bg-light">

  <div class="d-none"></div>
  <div class="d-none"></div>

  <div id="wrapper" class="d-flex">
    <!-- Sidebar Container -->
    <div id="sidebar-container" style="z-index: 1040;"></div>

    <div id="page-content-wrapper" class="flex-grow-1" style="background: transparent; min-height: 100vh;">
      <!-- Navbar Container -->
      <div id="navbar-container" class="mb-4"></div>

      <div class="container-fluid px-4 fade-in-up">
        <div id="breadcrumb-container" class="mb-3"></div>

        <div class="d-flex align-items-center mb-4 pb-2 border-bottom border-light">
          <h1 class="h3 fw-bold  mb-0">My Profile</h1>
        </div>

        <div class="row g-4">
          <div class="col-lg-4">
            <div class="card border-0 shadow-sm text-center p-4">
              <div class="position-relative d-inline-block mx-auto mb-3">
                <img id="profileAvatarImg"
                  src="https://ui-avatars.com/api/?name=User&background=1E5EFF&color=fff&size=128"
                  class="rounded-circle shadow-sm border border-4 border-light" alt="Avatar">
                <button
                  class="btn btn-sm btn-primary text-white position-absolute bottom-0 end-0 rounded-circle p-2 shadow"
                  title="Change Avatar">
                  <i data-lucide="camera" style="width:14px; height:14px;"></i>
                </button>
              </div>
              <h5 class="fw-bold mb-0 " id="profileDisplayName">User Name</h5>
              <p class="text-muted small mt-1" id="profileDisplayRole">Staff Member</p>
              <hr class="border-light w-75 mx-auto">
              <div class="text-start small text-muted mt-3 px-3">
                <p class="mb-2 d-flex justify-content-between">
                  <strong>Joined:</strong> <span id="profileJoinDate">Recent</span>
                </p>
                <p class="mb-0 d-flex justify-content-between">
                  <strong>Status:</strong> <span class="badge bg-success-soft text-success">Active</span>
                </p>
              </div>
            </div>
          </div>

          <div class="col-lg-8">
            <div class="card border-0 shadow-sm p-4 mb-4">
              <h5 class="fw-bold mb-4 ">Account Settings</h5>
              <div id="profileAlert" class="alert custom-alert py-2 small d-none" role="alert"></div>
              <form id="profileForm">
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label small fw-semibold text-muted">Full Name</label>
                    <input type="text" id="profName" class="form-control custom-input" value="">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label small fw-semibold text-muted">Email Address</label>
                    <input type="email" id="profEmail" class="form-control custom-input" disabled>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label small fw-semibold text-muted">Department</label>
                    <select id="profDept" class="form-select custom-input">
                      <option class="text-dark">Operations</option>
                      <option class="text-dark">Sales</option>
                      <option class="text-dark">Engineering</option>
                      <option class="text-dark">Marketing</option>
                      <option class="text-dark">HR</option>
                    </select>
                  </div>
                </div>
                <div class="mt-4">
                  <button type="submit" class="btn border-0 register-btn px-4">Save Changes</button>
                </div>
              </form>
            </div>

            <div class="card border-0 shadow-sm p-4 mb-4">
              <h5 class="fw-bold mb-4 ">Update Password</h5>
              <div id="passwordAlert" class="alert custom-alert py-2 small d-none" role="alert"></div>
              <form id="passwordForm">
                <div class="mb-3">
                  <label class="form-label small fw-semibold text-muted">Current Password</label>
                  <input type="password" id="currentPwd" class="form-control custom-input" required>
                </div>
                <div class="row g-3 mb-4">

                  <div class="col-md-6">
                    <label class="form-label small fw-semibold text-muted">New Password</label>
                    <input type="password" id="newPwd" class="form-control custom-input" required>
                    <small class="text-muted">
                      Must be at least 8 characters, include uppercase, number & symbol.
                    </small>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label small fw-semibold text-muted">Confirm New Password</label>
                    <input type="password" id="confirmPwd" class="form-control custom-input" required>
                  </div>
                </div>
                <button type="submit" class="btn btn-outline-dark">Update Password</button>
              </form>
            </div>

            <div class="card border-0 shadow-sm p-4 border-danger">
              <h5 class="fw-bold text-danger mb-2">Danger Zone</h5>
              <p class="text-muted small mb-3">
                This action is permanent and cannot be undone.
              </p>
              <button id="btnDeleteAccount" class="btn btn-danger">
                <i class="bi bi-trash me-1"></i> Delete Account
              </button>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/main.js"></script>
  <script>
    lucide.createIcons();

    document.addEventListener('DOMContentLoaded', () => {
      const user = AuthManager.getCurrentUser();
      if (user) {
        document.getElementById('profName').value = user.name || '';
        document.getElementById('profEmail').value = user.email || '';
        document.getElementById('profileDisplayName').textContent = user.name || 'User';
        document.getElementById('profileDisplayRole').textContent = (user.role || 'Staff').toUpperCase();

        const dept = document.getElementById('profDept');
        for (let i = 0; i < dept.options.length; i++) {
          if (dept.options[i].text === user.department) {
            dept.selectedIndex = i;
            break;
          }
        }

        const d = new Date(user.createdAt || Date.now());
        document.getElementById('profileJoinDate').textContent = d.toLocaleDateString();
        document.getElementById('profileAvatarImg').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=1E5EFF&color=fff&size=128`;
      }

      document.getElementById('profileForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const updatedName = document.getElementById('profName').value;
        const updatedDept = document.getElementById('profDept').value;

        // Update logic would go here. For demo, we just show success.
        const alertBox = document.getElementById('profileAlert');
        alertBox.className = 'alert py-2 small alert-success';
        alertBox.textContent = 'Profile updated successfully!';
        alertBox.classList.remove('d-none');
        setTimeout(() => alertBox.classList.add('d-none'), 3000);
      });

      document.getElementById('passwordForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const newP = document.getElementById('newPwd').value;
        const confP = document.getElementById('confirmPwd').value;
        const alertBox = document.getElementById('passwordAlert');

        if (newP !== confP) {
          alertBox.className = 'alert py-2 small custom-alert';
          alertBox.textContent = 'Passwords do not match.';
          alertBox.classList.remove('d-none');
          return;
        }

        // Pass update logic here
        alertBox.className = 'alert py-2 small alert-success';
        alertBox.textContent = 'Password updated successfully!';
        alertBox.classList.remove('d-none');
        e.target.reset();
        setTimeout(() => alertBox.classList.add('d-none'), 3000);
      });

      document.getElementById('btnDeleteAccount').addEventListener('click', () => {
        if (confirm('Are you absolutely sure you want to delete your account? This action cannot be undone.')) {
          AuthManager.logout();
        }
      });

    });
  </script>
</body>

</html>
