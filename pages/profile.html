<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | KPI System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div id="wrapper">
  <div class="row g-0">
    <nav class="col-md-2 d-none d-md-block sidebar shadow-sm">
    <div id="sidebar-container"></div>
    <div id="navbar-container"></div>
    </nav>

    <main class="col-md-10 px-4 bg-light min-vh-100">
      <div class="pt-4 pb-2 mb-4 border-bottom">
        <h1 class="h3 fw-bold">My Profile</h1>
      </div>

      <div class="row">
        <div class="col-lg-4 mb-4">
          <div class="card border-0 shadow-sm text-center p-4">
            <div class="position-relative d-inline-block mx-auto mb-3">
              <img src="https://ui-avatars.com/api/?name=User+Name&background=4361ee&color=fff&size=128" 
                   class="rounded-circle shadow-sm border border-4 border-white" alt="Avatar">
              <button class="btn btn-sm btn-primary position-absolute bottom-0 end-0 rounded-circle p-2 shadow">
                <i data-lucide="camera" style="width:14px; height:14px;"></i>
              </button>
            </div>
            <h5 class="fw-bold mb-0">Alex Johnson</h5>
            <p class="text-muted small">Senior Manager</p>
            <hr>
            <div class="text-start small">
              <p class="mb-2"><strong>Joined:</strong> Jan 2024</p>
              <p class="mb-0"><strong>Status:</strong> <span class="badge bg-success-soft text-success">Active</span></p>
            </div>
          </div>
        </div>

        <div class="col-lg-8">
          <div class="card border-0 shadow-sm p-4 mb-4">
            <h5 class="fw-bold mb-4">Account Settings</h5>
            <form id="profileForm">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label small fw-semibold text-secondary">Full Name</label>
                  <input type="text" class="form-control custom-input" value="Alex Johnson">
                </div>
                <div class="col-md-6">
                  <label class="form-label small fw-semibold text-secondary">Email Address</label>
                  <input type="email" class="form-control custom-input" value="alex.j@company.com">
                </div>
                <div class="col-md-6">
                  <label class="form-label small fw-semibold text-secondary">Phone Number</label>
                  <input type="text" class="form-control custom-input" placeholder="+1 (555) 000-0000">
                </div>
                <div class="col-md-6">
                  <label class="form-label small fw-semibold text-secondary">Department</label>
                  <select class="form-select custom-input">
                    <option selected>Operations</option>
                    <option>Sales</option>
                    <option>Engineering</option>
                  </select>
                </div>
              </div>
              <div class="mt-4">
                <button type="submit" class="btn btn-primary px-4">Save Changes</button>
              </div>
            </form>
          </div>

          <div class="card border-0 shadow-sm p-4">
            <h5 class="fw-bold mb-4">Update Password</h5>
            <form id="passwordForm">
              <div class="mb-3">
                <label class="form-label small fw-semibold text-secondary">Current Password</label>
                <input type="password" class="form-control custom-input">
              </div>
              <div class="row g-3 mb-4">
                <div class="col-md-6">
                  <label class="form-label small fw-semibold text-secondary">New Password</label>
                  <input type="password" class="form-control custom-input">
                </div>
                <div class="col-md-6">
                  <label class="form-label small fw-semibold text-secondary">Confirm New Password</label>
                  <input type="password" class="form-control custom-input">
                </div>
              </div>
              <button type="submit" class="btn btn-outline-primary">Update Password</button>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/load-components.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
