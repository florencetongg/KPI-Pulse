<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assign KPI | KPI Pulse</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body class="bg-light">

  <div class="d-none"></div>
  <div class="d-none"></div>

  <div id="wrapper" class="d-flex">
    <div id="sidebar-container" style="z-index: 1040;"></div>

    <div id="page-content-wrapper" class="flex-grow-1" style="background: transparent;">
      <div id="navbar-container" class="mb-4"></div>

      <div class="container-fluid px-4 fade-in-up" style="max-width: 800px; margin: 0 auto;">

        <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom border-light">
          <div>
            <h1 class="h3 fw-bold  mb-1"><i data-lucide="target" class="me-2 text-primary"></i>Assign New KPI</h1>
            <p class="text-muted small mb-0">Create and assign a goal to a staff member.</p>
          </div>
          <a href="/pages/manager-kpi.html" class="btn btn-outline-dark btn-sm ">Cancel</a>
        </div>

        <div class="card border-0 shadow-sm p-4 p-md-5">
          <form id="kpiForm">
            <div class="row g-4">
              <div class="col-12">
                <label class="form-label small fw-semibold text-muted">KPI Name</label>
                <input type="text" class="form-control custom-input" id="kpiTitle" placeholder="e.g. Q4 Sales Target"
                  required>
              </div>

              <div class="col-md-6">
                <label class="form-label small fw-semibold text-muted">Category</label>
                <select class="form-select custom-input text-dark" id="kpiCategory" required>
                  <option value="" disabled selected>Select Category</option>
                  <option value="Sales">Sales</option>
                  <option value="Development">Development</option>
                  <option value="Marketing">Marketing</option>
                  <option value="Performance">Performance</option>
                  <option value="Operations">Operations</option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label small fw-semibold text-muted">Target Value</label>
                <input type="text" class="form-control custom-input" id="kpiTarget"
                  placeholder="e.g. $50,000 or 100 features" required>
              </div>

              <div class="col-md-6">
                <label class="form-label small fw-semibold text-muted">Assign To Employee</label>
                <select class="form-select custom-input text-dark" id="kpiAssignee" required>
                  <option value="" disabled selected>Select Staff</option>
                  <!-- Populated by JS -->
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label small fw-semibold text-muted">Due Date</label>
                <input type="date" class="form-control custom-input" id="kpiDueDate" required>
              </div>

              <div class="col-12">
                <label class="form-label small fw-semibold text-muted">Description / Instructions</label>
                <textarea class="form-control custom-input" id="kpiDesc" rows="3"
                  placeholder="Additional details the employee needs to know..."></textarea>
              </div>

              <div class="col-12 mt-4 text-end">
                <button type="submit" class="btn btn-primary text-white px-5 py-2 fw-bold border-0"
                  style="border-radius: 10px;">Create KPI Goal</button>
              </div>
            </div>
          </form>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/kpi-staff.js"></script>
  <script>
    lucide.createIcons();

    document.addEventListener('DOMContentLoaded', () => {
      // Populate Assignee dropdown
      const staffSelect = document.getElementById('kpiAssignee');
      const staffMembers = AuthManager._getAllUsers().filter(u => u.role === 'staff');

      staffMembers.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = `${s.name} (${s.department})`;
        opt.className = 'text-dark';
        staffSelect.appendChild(opt);
      });

      document.getElementById('kpiForm').addEventListener('submit', (e) => {
        e.preventDefault();

        const kpiData = {
          title: document.getElementById('kpiTitle').value,
          category: document.getElementById('kpiCategory').value,
          target: document.getElementById('kpiTarget').value,
          assignedTo: document.getElementById('kpiAssignee').value,
          dueDate: document.getElementById('kpiDueDate').value
        };

        KPIStore.createKPI(kpiData);

        alert('KPI Successfully Assigned!');
        window.location.href = 'manager-kpi.html';
      });
    });
  </script>
</body>

</html>
