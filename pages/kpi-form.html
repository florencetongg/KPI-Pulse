<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create KPI | KPI Pro</title>

  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&family=DM+Sans:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">

  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f8f9fb;
    }

    .container {
      max-width: 700px;
      margin: auto;
      padding: 40px 20px;
    }

    h1 {
      font-family: 'Sora', sans-serif;
      margin-bottom: 10px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 30px;
      border: 1px solid #e2e8f0;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      color: #64748b;
      display: block;
      margin-bottom: 6px;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #4f46e5;
      outline: none;
    }

    .btn {
      margin-top: 10px;
      padding: 10px;
      background: #4f46e5;
      color: white;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      width: 100%;
      font-weight: 600;
    }

    .btn-secondary {
      background: #fff;
      border: 1px solid #e2e8f0;
    }

    .error {
      color: red;
      font-size: 12px;
      display: none;
    }
  </style>
</head>

<body>

  <div id="navbar-container"></div>

  <div class="container">
    <h1>Create KPI</h1>
    <p style="color:#64748b;">Assign KPI to staff</p>

    <div class="card">

      <form id="kpiForm">

        <div class="form-group">
          <label>KPI Name</label>
          <input type="text" id="kpiTitle" required>
        </div>

        <div class="form-group">
          <label>Category</label>
          <select id="kpiCategory" required>
            <option value="">Select Category</option>
          </select>
        </div>

        <div class="form-group">
          <label>Target</label>
          <input type="text" id="kpiTarget" required>
        </div>

        <div class="form-group">
          <label>Assign Staff</label>
          <select id="kpiAssignee">
            <!-- JS WILL POPULATE -->
          </select>
        </div>

        <div class="form-group">
          <label>Due Date</label>
          <input type="date" id="kpiDueDate" required>
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea id="kpiDesc"></textarea>
        </div>

        <button type="submit" class="btn">Create KPI</button>
        <a href="manager-kpi.html" class="btn btn-secondary">Cancel</a>

      </form>

    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/kpi-manager.js"></script>
  <script src="/js/main.js"></script>

</body>

</html>
