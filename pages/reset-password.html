<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | KPI System</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gradient-primary">

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card login-card border-0 shadow-lg p-4">
    
    <div class="text-center mb-4">
      <div class="brand-logo mb-2 mx-auto">K</div>
      <h3 class="fw-bold text-dark">Reset Password</h3>
      <p class="text-muted small">Set a secure new password for your account</p>
    </div>

    <div id="errorAlert" class="alert alert-danger py-2 small d-none" role="alert">
      Please fix the errors below.
    </div>

    <form id="resetForm" novalidate>
      
      <div class="mb-3 position-relative">
        <label for="newPassword" class="form-label small fw-semibold text-secondary">New Password</label>
        <div class="input-group">
          <input type="password" class="form-control custom-input" id="newPassword" placeholder="••••••••" required>
          <span class="input-group-text bg-white border-start-0 toggle-password" data-target="newPassword" style="cursor:pointer;">
            <i class="bi bi-eye-slash-fill text-muted"></i>
          </span>
        </div>
        <div class="form-text small" style="font-size: 0.75rem;">8+ chars, uppercase, number & symbol.</div>
        <div class="invalid-feedback">Requirements not met.</div>
      </div>

      <div class="mb-4 position-relative">
        <label for="confirmPassword" class="form-label small fw-semibold text-secondary">Confirm Password</label>
        <div class="input-group">
          <input type="password" class="form-control custom-input" id="confirmPassword" placeholder="••••••••" required>
          <span class="input-group-text bg-white border-start-0 toggle-password" data-target="confirmPassword" style="cursor:pointer;">
            <i class="bi bi-eye-slash-fill text-muted"></i>
          </span>
        </div>
        <div class="invalid-feedback">Passwords must match.</div>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">
        Update Password
      </button>
    </form>

    <div class="text-center mt-4">
      <p class="small text-muted">
        Remembered your password? 
        <a href="login.html" class="text-decoration-none">Login here</a>
      </p>
    </div>
  </div>
</div>

<script>
  const resetForm = document.getElementById('resetForm');
  const errorAlert = document.getElementById('errorAlert');
  const newPassword = document.getElementById('newPassword');
  const confirmPassword = document.getElementById('confirmPassword');

  // Form Validation
  resetForm.addEventListener('submit', function(e) {
    e.preventDefault();
    let valid = true;
    errorAlert.classList.add('d-none');

    // Regex: 8 chars, 1 Upper, 1 Number, 1 Special
    const passwordPattern = /^(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*]).{8,}$/;

    if (!passwordPattern.test(newPassword.value)) {
      newPassword.classList.add('is-invalid');
      valid = false;
    } else {
      newPassword.classList.remove('is-invalid');
    }

    if (confirmPassword.value !== newPassword.value || !confirmPassword.value) {
      confirmPassword.classList.add('is-invalid');
      valid = false;
    } else {
      confirmPassword.classList.remove('is-invalid');
    }

    if (!valid) {
      errorAlert.classList.remove('d-none');
      return;
    }

    alert('Password has been reset successfully!');
    resetForm.reset();
  });

  // Toggle Password Visibility
  document.querySelectorAll('.toggle-password').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = document.getElementById(btn.getAttribute('data-target'));
      const icon = btn.querySelector('i');
      if (target.type === 'password') {
        target.type = 'text';
        icon.classList.replace('bi-eye-slash-fill', 'bi-eye-fill');
      } else {
        target.type = 'password';
        icon.classList.replace('bi-eye-fill', 'bi-eye-slash-fill');
      }
    });
  });
</script>

</body>
</html>
