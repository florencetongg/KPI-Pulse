<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KPI Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div id="wrapper">
  <div class="row g-0">
    <div class="col-md-2 d-none d-md-block">
    <div id="sidebar-container"></div>
    <div id="navbar-container"></div>
    </div>

    <main class="col-md-10 px-4 bg-light min-vh-100">
      <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-4 pb-2 mb-4 border-bottom">
        <h1 class="h3 fw-bold">Executive Dashboard</h1>
        <div class="btn-toolbar mb-2 mb-md-0">
          <button type="button" class="btn btn-sm btn-outline-primary me-2">Export</button>
          <button type="button" class="btn btn-sm btn-primary">+ New KPI</button>
        </div>
      </div>

      <div class="row g-4">
        <div class="col-md-4">
          <div class="card stat-card border-0 shadow-sm h-100 p-3">
            <div class="d-flex justify-content-between">
              <div>
                <p class="text-muted mb-1 fw-medium">Total KPI</p>
                <h2 class="fw-bold mb-0">15</h2>
              </div>
              <div class="icon-box bg-primary-light text-primary">
                <i data-lucide="bar-chart-3"></i>
              </div>
            </div>
            <div class="mt-3">
              <span class="text-success small fw-bold">↑ 12%</span>
              <span class="text-muted small ms-1">from last month</span>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card stat-card border-0 shadow-sm h-100 p-3">
            <div class="d-flex justify-content-between">
              <div>
                <p class="text-muted mb-1 fw-medium">Completed</p>
                <h2 class="fw-bold mb-0 text-success">10</h2>
              </div>
              <div class="icon-box bg-success-light text-success">
                <i data-lucide="check-circle"></i>
              </div>
            </div>
            <div class="mt-3">
              <div class="progress" style="height: 6px;">
                <div class="progress-bar bg-success" style="width: 66%"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card stat-card border-0 shadow-sm h-100 p-3">
            <div class="d-flex justify-content-between">
              <div>
                <p class="text-muted mb-1 fw-medium">Pending</p>
                <h2 class="fw-bold mb-0 text-warning">5</h2>
              </div>
              <div class="icon-box bg-warning-light text-warning">
                <i data-lucide="clock"></i>
              </div>
            </div>
            <div class="mt-3 small text-muted">Next deadline: Tomorrow</div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/load-components.js"></script>
<script>
  // Initialize icons
  lucide.createIcons();
</script>
</body>
</html>
