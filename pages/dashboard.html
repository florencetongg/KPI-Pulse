<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | KPI Pro</title>

  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&family=DM+Sans:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">

  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f8f9fb;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 30px 20px;
    }

    h1 {
      font-family: 'Sora', sans-serif;
      font-weight: 800;
      color: #0f172a;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .search {
      padding: 10px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      width: 220px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 25px;
    }

    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 20px;
    }

    .progress-bar {
      height: 8px;
      background: #e2e8f0;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      height: 100%;
      background: #4f46e5;
      width: 0%;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #e2e8f0;
    }

    th,
    td {
      padding: 14px;
      font-size: 14px;
    }

    th {
      background: #f1f5f9;
      color: #64748b;
      text-align: left;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #64748b;
    }

    .btn {
      padding: 6px 12px;
      background: #4f46e5;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      font-size: 13px;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div id="navbar-container"></div>

  <div class="container">

    <!-- HEADER -->
    <div class="top-bar">
      <div>
        <h1>Dashboard</h1>
        <p style="color:#64748b;">Track your KPI progress</p>
      </div>

      <input type="text" id="searchInput" class="search" placeholder="Search KPI...">
    </div>

    <!-- STATS (EMPTY → JS WILL FILL) -->
    <div class="card-grid">
      <div class="card">
        <p>Total KPI</p>
        <h3 id="totalKPI">0</h3>
      </div>

      <div class="card">
        <p>Completed</p>
        <h3 id="completedKPI">0</h3>
      </div>

      <div class="card">
        <p>Pending</p>
        <h3 id="pendingKPI">0</h3>
      </div>

      <div class="card">
        <p>Progress</p>
        <h3 id="progressText">0%</h3>
        <div class="progress-bar">
          <div class="progress-fill" id="progressBar"></div>
        </div>
      </div>
    </div>

    <!-- KPI TABLE -->
    <table>
      <thead>
        <tr>
          <th>KPI Name</th>
          <th>Target</th>
          <th>Status</th>
          <th>Progress</th>
          <th></th>
        </tr>
      </thead>

      <tbody id="kpiTableBody">
        <!-- JS WILL RENDER -->
      </tbody>
    </table>

    <!-- EMPTY STATE -->
    <div id="emptyState" class="empty-state">
      No KPI assigned yet.
    </div>

  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/kpi-staff.js"></script>
  <script src="/js/main.js"></script>

</body>

</html>
