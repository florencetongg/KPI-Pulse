<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff KPI | KPI Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div id="wrapper">
  <div class="row g-0">
    <!-- Sidebar -->
    <nav class="col-md-2 d-none d-md-block sidebar shadow-sm">
    <div id="sidebar-container"></div>
    <div id="navbar-container"></div>
    </nav>

    <!-- Main Content -->
    <main class="col-md-10 px-4 bg-light min-vh-100">
      <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-4 pb-2 mb-4 border-bottom">
        <h1 class="h3 fw-bold">Assigned KPIs</h1>
      </div>

      <div class="row g-4">
        <!-- KPI Card Example -->
        <div class="col-md-4">
          <div class="card kpi-card shadow-sm h-100 p-3">
            <h5>Increase Sales Revenue</h5>
            <p class="text-muted mb-1">Target: RM 50,000</p>
            <p class="text-muted mb-2">Due Date: 30-Apr-2026</p>
            <span class="badge badge-pending">Pending</span>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card kpi-card shadow-sm h-100 p-3">
            <h5>Reduce Customer Complaints</h5>
            <p class="text-muted mb-1">Target: 5% Reduction</p>
            <p class="text-muted mb-2">Due Date: 15-May-2026</p>
            <span class="badge badge-active">In Progress</span>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card kpi-card shadow-sm h-100 p-3">
            <h5>Complete Training Modules</h5>
            <p class="text-muted mb-1">Target: 100% Completion</p>
            <p class="text-muted mb-2">Due Date: 10-Jun-2026</p>
            <span class="badge badge-completed">Completed</span>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/load-components.js"></script>
<script>
  lucide.createIcons();
</script>

</body>
</html>
