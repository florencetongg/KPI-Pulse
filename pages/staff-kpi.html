<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff KPIs | KPI Pulse</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body class="bg-light">

  <div id="wrapper" class="d-flex">
    <div id="sidebar-container" style="z-index: 1040;"></div>

    <div id="page-content-wrapper" class="flex-grow-1" style="background: transparent;">
      <div id="navbar-container" class="mb-4"></div>

      <div class="container-fluid px-4 fade-in-up">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
          <div>
            <h1 class="h3 fw-bold mb-1">Assigned KPIs</h1>
            <p class="text-muted small mb-0">List of your personal active tracking goals.</p>
          </div>
        </div>

        <!-- KPI List -->
        <div class="card border-0 shadow-sm p-4 border-0 mb-4">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold mb-0">My Action Items</h5>
            <div class="d-flex gap-2">
              <!-- Mock KPI filtering by Status -->
              <select class="form-select custom-input form-select-sm" id="staff-status-filter" style="width:150px;">
                <option value="">All Statuses</option>
                <option value="pending">Pending</option>
                <option value="on-track">On Track</option>
                <option value="delayed">Delayed</option>
              </select>
              <input type="text" id="staff-search-input" class="form-control custom-input form-control-sm"
                style="width:200px;" placeholder="Search my KPIs...">
            </div>
          </div>

          <div class="table-responsive">
            <table class="table table-hover table-borderless align-middle mb-0">
              <thead style="border-bottom: 2px solid #dee2e6;">
                <tr>
                  <th class="ps-3 text-uppercase text-muted small py-3" style="background: transparent;">KPI Name</th>
                  <th class="text-uppercase text-muted small py-3" style="background: transparent;">Target</th>
                  <th class="text-uppercase text-muted small py-3" style="background: transparent; width: 250px;">
                    Progress</th>
                  <th class="text-uppercase text-muted small py-3" style="background: transparent;">Status</th>
                  <th class="text-end pe-3 text-uppercase text-muted small py-3" style="background: transparent;">Action
                  </th>
                </tr>
              </thead>
              <tbody id="staff-dashboard-kpi-list">
                <!-- Rendered via JS -->
                <tr>
                  <td colspan="5" class="text-center py-5" id="staff-empty-state">
                    <i data-lucide="inbox" class="text-muted mb-2 d-block mx-auto" style="width:48px; height:48px;"></i>
                    <h6 class="fw-bold text-dark">No Data Available</h6>
                    <p class="text-muted small">You have not been assigned any KPIs yet.</p>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/kpi-staff.js"></script>
  <script>
    lucide.createIcons();
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof renderStaffDashboard === 'function') {
        renderStaffDashboard();
      }
    });

    // Mock filtering behavior trigger
    document.getElementById('staff-status-filter').addEventListener('change', () => {
      // Triggering a re-render or mock filter. In production this would filter the array.
    });
  </script>
</body>

</html>
