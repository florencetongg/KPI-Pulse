<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update KPI Progress | KPI Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>

<div id="wrapper">
  <div class="row g-0">
    <!-- Sidebar -->
    <nav class="col-md-2 d-none d-md-block sidebar shadow-sm">
    <div id="sidebar-container"></div>
    <div id="navbar-container"></div>
    </nav>

    <!-- Main Content -->
    <main class="col-md-10 px-4 bg-light min-vh-100">
      <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-4 pb-2 mb-4 border-bottom">
        <h1 class="h3 fw-bold">Update KPI Progress</h1>
      </div>

      <div class="row">
        <div class="col-md-6">
          <div class="card kpi-card p-4 shadow-sm">
            <form id="progressForm">
              <div class="mb-3">
                <label for="kpiName" class="form-label">KPI</label>
                <input type="text" class="form-control custom-input" id="kpiName" value="Increase Sales Revenue" readonly>
              </div>

              <div class="mb-3">
                <label for="progressSlider" class="form-label">Progress: <span id="progressValue">0%</span></label>
                <input type="range" class="form-range" min="0" max="100" value="0" id="progressSlider">
              </div>

              <div class="mb-3">
                <label for="evidenceUpload" class="form-label">Upload Evidence</label>
                <input class="form-control custom-input" type="file" id="evidenceUpload" accept=".pdf,.jpg,.png">
                <div class="form-text">Upload PDF, JPG, or PNG as evidence.</div>
              </div>

              <button type="submit" class="btn btn-primary-custom w-100">Submit</button>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
  lucide.createIcons();

  const progressSlider = document.getElementById('progressSlider');
  const progressValue = document.getElementById('progressValue');
  const form = document.getElementById('progressForm');

  progressSlider.addEventListener('input', () => {
    progressValue.textContent = progressSlider.value + '%';
  });

  form.addEventListener('submit', e => {
    e.preventDefault();
    const file = document.getElementById('evidenceUpload').files[0];
    if (!file) {
      alert('Please upload evidence before submitting.');
      return;
    }
    alert(`Progress: ${progressSlider.value}% submitted with file: ${file.name}`);
    form.reset();
    progressValue.textContent = '0%';
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/load-components.js"></script>

</body>
</html>
