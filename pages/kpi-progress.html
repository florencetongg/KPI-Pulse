<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Progress | KPI Pro</title>

  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&family=DM+Sans:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">

  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f8f9fb;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 40px 20px;
    }

    h1 {
      font-family: 'Sora', sans-serif;
    }

    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .slider {
      width: 100%;
      margin-top: 15px;
    }

    .progress-value {
      font-size: 40px;
      font-weight: 800;
      text-align: center;
      color: #4f46e5;
    }

    textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
    }

    .upload-box {
      border: 2px dashed #e2e8f0;
      padding: 30px;
      text-align: center;
      border-radius: 12px;
      cursor: pointer;
    }

    .btn {
      background: #4f46e5;
      color: white;
      padding: 10px;
      border-radius: 8px;
      border: none;
      width: 100%;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-secondary {
      background: #fff;
      border: 1px solid #e2e8f0;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div id="navbar-container"></div>

  <div class="container">

    <h1>Update Progress</h1>
    <p id="kpiTitleHeader" style="color:#64748b;">Loading KPI...</p>

    <!-- PROGRESS -->
    <div class="card">
      <div class="progress-value" id="progressValDisplay">0%</div>
      <input type="range" id="progressSlider" class="slider" min="0" max="100" value="0">

      <textarea id="progressNote" placeholder="Describe your progress..." required></textarea>
    </div>

    <!-- UPLOAD -->
    <div class="card">
      <div class="upload-box" id="uploadZone">
        Click to upload evidence
        <input type="file" id="evidenceFile" hidden>
      </div>

      <div id="filePreview" style="margin-top:10px; display:none;">
        <span id="fileName"></span>
        <button id="removeFile">Remove</button>
      </div>
    </div>

    <button class="btn" id="submitBtn">Save Progress</button>
    <a href="staff-kpi.html" class="btn btn-secondary">Back</a>

  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/kpi-staff.js"></script>
  <script src="/js/main.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {

      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');

      const slider = document.getElementById('progressSlider');
      const display = document.getElementById('progressValDisplay');

      slider.addEventListener('input', () => {
        display.textContent = slider.value + "%";
      });

      const uploadZone = document.getElementById('uploadZone');
      const fileInput = document.getElementById('evidenceFile');
      const filePreview = document.getElementById('filePreview');
      const fileName = document.getElementById('fileName');

      let file = null;

      uploadZone.onclick = () => fileInput.click();

      fileInput.onchange = () => {
        file = fileInput.files[0];
        if (file) {
          fileName.textContent = file.name;
          filePreview.style.display = "block";
          uploadZone.style.display = "none";
        }
      };

      document.getElementById('removeFile').onclick = () => {
        file = null;
        fileInput.value = "";
        filePreview.style.display = "none";
        uploadZone.style.display = "block";
      };

      document.getElementById('submitBtn').onclick = () => {
        if (!id) return alert("Missing KPI ID");

        KPIStore.updateProgress(id, slider.value, progressNote.value);

        if (file) {
          KPIStore.addEvidence(id, {
            name: file.name
          });
        }

        alert("Progress updated");
        window.location.href = "staff-kpi.html";
      };

    });
  </script>

</body>

</html>
