<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KPI Verification</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div id="wrapper">
  <div class="row g-0">
    <!-- Sidebar -->
    <nav class="col-md-2 d-none d-md-block sidebar shadow-sm">
    <div id="sidebar-container"></div>
    <div id="navbar-container"></div>
    </nav>

    <!-- Main Content -->
    <main class="col-md-10 px-4 bg-light min-vh-100">
      <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-4 pb-2 mb-4 border-bottom">
        <h1 class="h3 fw-bold">KPI Verification</h1>
      </div>

      <!-- KPI Table -->
      <div class="card shadow-sm p-3 mb-4">
        <table class="table table-hover">
          <thead>
            <tr>
              <th>Name</th>
              <th>Target</th>
              <th>Staff</th>
              <th>Status</th>
              <th>Evidence</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Increase Sales</td>
              <td>10% growth</td>
              <td>John Doe</td>
              <td><span class="badge badge-pending">Pending</span></td>
              <td>
                <a href="#" class="btn btn-sm btn-outline-secondary">View File</a>
              </td>
              <td>
                <button class="btn btn-sm btn-success me-1">Approve</button>
                <button class="btn btn-sm btn-danger">Reject</button>
              </td>
            </tr>
            <!-- Add more rows dynamically -->
          </tbody>
        </table>
      </div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/load-components.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
