<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Verification | KPI Pro</title>

  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&family=DM+Sans:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">

  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f8f9fb;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 30px;
    }

    h1 {
      font-family: 'Sora', sans-serif;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .badge {
      background: #fef3c7;
      color: #d97706;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      display: inline-block;
    }

    .btn {
      padding: 8px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    .approve {
      background: #16a34a;
      color: white;
    }

    .reject {
      background: white;
      border: 1px solid #e2e8f0;
    }

    .empty {
      text-align: center;
      color: #64748b;
      padding: 50px;
    }
  </style>
</head>

<body>

  <div id="navbar-container"></div>

  <div class="container">

    <h1>Verification</h1>
    <p style="color:#64748b;">Review KPI submissions</p>

    <div id="verificationList" class="grid"></div>

    <div id="emptyState" class="empty">
      No KPI pending verification.
    </div>

  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/kpi-manager.js"></script>
  <script src="/js/main.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {

      const list = document.getElementById('verificationList');
      const empty = document.getElementById('emptyState');

      const kpis = KPIStore.getAllKPIs().filter(k => k.progress >= 100);

      if (!kpis.length) {
        empty.style.display = "block";
        return;
      }

      empty.style.display = "none";

      list.innerHTML = kpis.map(k => `
    <div class="card" id="card-${k.id}">
      <span class="badge">Pending Review</span>

      <h3>${k.title}</h3>
      <p>${k.progress}% completed</p>

      <div style="margin-top:auto; display:flex; gap:10px;">
        <button class="btn approve" onclick="verify('${k.id}', true)">Approve</button>
        <button class="btn reject" onclick="verify('${k.id}', false)">Reject</button>
      </div>
    </div>
  `).join('');

    });

    function verify(id, approve) {
      alert(approve ? "Approved" : "Rejected");
      document.getElementById("card-" + id).remove();
    }
  </script>

</body>

</html>
